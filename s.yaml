# Serverless Devs 部署配置 — 阿里云函数计算 FC2.0
# 使用教程：
#   1. 安装：npm install @serverless-devs/s -g
#   2. 配置：s config add（输入阿里云 AK / SK）
#   3. 部署：s deploy
#   4. 查日志：s logs -t

edition: 1.0.0
name: life-timeline-bot
access: default

services:
  bot:
    component: devsapp/fc
    actions:
      pre-deploy:
        - run: "pip install --platform manylinux2014_x86_64 --target ./_deps --implementation cp --python-version 39 --only-binary=:all: -r requirements-fc.txt"
          path: ./
    props:
      region: cn-hangzhou
      service:
        name: life-timeline-bot
        description: 生活记录 Bot - 语音/文字记录每天经历
        internetAccess: true
      function:
        name: bot-handler
        runtime: python3.9
        codeUri: ./
        exclude:
          - .gitignore
          - s.yaml
          - README.md
          - config/config.example.yaml
          - .git/
          - "*.pyc"
          - requirements.txt
        handler: fc_handler.handler
        memorySize: 512
        timeout: 120
        instanceConcurrency: 10
      triggers:
        - name: http-trigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - HEAD
